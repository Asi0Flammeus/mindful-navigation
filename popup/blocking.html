<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindful Navigation - Pause & Reflect</title>
  <link rel="stylesheet" href="../styles/overlay.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Inter:wght@300;400;500&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #FFF8F0 0%, #F5EBE0 50%, #F0E6D8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle artistic background pattern */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(218, 186, 155, 0.1) 0%, transparent 70%);
      animation: float 20s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -50%;
      left: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(205, 180, 155, 0.08) 0%, transparent 70%);
      animation: float 25s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 50px) scale(1.1); }
    }

    .blocking-container {
      max-width: 580px;
      width: 90%;
      background: rgba(255, 253, 250, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 44px;
      box-shadow:
        0 8px 32px rgba(139, 103, 76, 0.08),
        0 2px 8px rgba(139, 103, 76, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(218, 186, 155, 0.2);
      position: relative;
      z-index: 1;
    }

    .mindful-icon {
      font-size: 56px;
      text-align: center;
      margin-bottom: 24px;
      opacity: 0.9;
      filter: grayscale(20%);
    }

    .mindful-title {
      font-family: 'Crimson Pro', serif;
      font-size: 28px;
      font-weight: 400;
      text-align: center;
      color: #3E3831;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .mindful-domain {
      text-align: center;
      font-size: 14px;
      font-weight: 400;
      color: #7A6F5D;
      margin-bottom: 36px;
      letter-spacing: 0.01em;
    }

    .mindful-domain strong {
      color: #8B674C;
      font-weight: 500;
      background: linear-gradient(120deg, rgba(205, 180, 155, 0.2) 0%, rgba(218, 186, 155, 0.3) 100%);
      padding: 2px 8px;
      border-radius: 6px;
    }

    #content {
      min-height: 300px;
    }

    /* Decorative corner elements */
    .blocking-container::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      border-top: 1px solid rgba(139, 103, 76, 0.15);
      border-left: 1px solid rgba(139, 103, 76, 0.15);
      border-radius: 2px;
    }

    .blocking-container::after {
      content: '';
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-bottom: 1px solid rgba(139, 103, 76, 0.15);
      border-right: 1px solid rgba(139, 103, 76, 0.15);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="blocking-container">
    <div class="mindful-icon">🧘</div>
    <h1 class="mindful-title">Mindful Navigation</h1>
    <p class="mindful-domain">You're about to visit: <strong id="domain-name"></strong></p>

    <div id="content">
      <!-- Content will be injected by JavaScript -->
    </div>
  </div>

  <script src="../browser-polyfill.js"></script>
  <script src="blocking.js"></script>
</body>
</html>
