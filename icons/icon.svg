<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Soft lavender gradient for the enso stroke -->
    <linearGradient id="ensoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#9B89F0"/>
      <stop offset="55%" stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#5D4FCC"/>
    </linearGradient>

    <!-- Compass needle gradient (north = accent, south = muted) -->
    <linearGradient id="needleNorth" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"  stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#9B89F0"/>
    </linearGradient>
    <linearGradient id="needleSouth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#C9C0F2" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#A89EE0" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Subtle glow under the enso -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#7B68EE" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#7B68EE" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#7B68EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Halo -->
  <circle cx="256" cy="256" r="240" fill="url(#halo)"/>

  <!-- Enso (zen circle) — open at the top-right, hand-drawn feel -->
  <path
    d="M 360 130
       A 180 180 0 1 1 256 76
       A 180 180 0 0 1 388 158"
    fill="none"
    stroke="url(#ensoGrad)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.95"/>

  <!-- Compass needle through the enso -->
  <g transform="translate(256 256) rotate(-25)">
    <!-- North half (pointing up-right originally; rotated) -->
    <polygon points="0,-150 14,0 0,8 -14,0"
             fill="url(#needleNorth)"/>
    <!-- South half -->
    <polygon points="0,150 14,0 0,-8 -14,0"
             fill="url(#needleSouth)"/>
    <!-- Center pivot -->
    <circle cx="0" cy="0" r="10" fill="#FFF8F0"/>
    <circle cx="0" cy="0" r="6" fill="#5D4FCC"/>
  </g>
</svg>
